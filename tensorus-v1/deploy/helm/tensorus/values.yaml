# Default values for the Tensorus chart.

replicaCount: 1

image:
  repository: ghcr.io/tensorus/tensorus
  tag: "" # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# API authentication. A Secret is created holding this key; the server requires
# it on all data endpoints. CHANGE THIS before deploying.
auth:
  apiKey: "change-me-please"

# Persistent storage for the warm tier (one PVC per replica via StatefulSet).
persistence:
  enabled: true
  storageClass: ""
  size: 10Gi
  accessModes:
    - ReadWriteOnce

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: tensorus.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 4Gi

# Horizontal Pod Autoscaler (scales the StatefulSet's stateless request path).
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

# Prometheus Operator ServiceMonitor scraping /metrics.
serviceMonitor:
  enabled: false
  interval: 30s

# Optional GPU request for the compute path (cuTENSOR/cuSOLVER); 0 = CPU only.
gpu:
  nvidiaCount: 0

env:
  logJson: "true"
  rustLog: "info"

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
