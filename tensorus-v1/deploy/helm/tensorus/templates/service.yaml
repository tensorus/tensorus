apiVersion: v1
kind: Service
metadata:
  name: {{ include "tensorus.fullname" . }}
  labels:
    {{- include "tensorus.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "tensorus.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tensorus.fullname" . }}-headless
  labels:
    {{- include "tensorus.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "tensorus.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
