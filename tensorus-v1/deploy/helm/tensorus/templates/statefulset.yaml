apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "tensorus.fullname" . }}
  labels:
    {{- include "tensorus.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "tensorus.fullname" . }}-headless
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "tensorus.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tensorus.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: tensorus
          image: {{ include "tensorus.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          env:
            - name: TENSORUS_DATA_DIR
              value: "/data"
            - name: TENSORUS_REST_PORT
              value: {{ .Values.service.port | quote }}
            - name: TENSORUS_LOG_JSON
              value: {{ .Values.env.logJson | quote }}
            - name: RUST_LOG
              value: {{ .Values.env.rustLog | quote }}
            - name: TENSORUS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "tensorus.fullname" . }}-auth
                  key: api-key
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- $res := deepCopy .Values.resources }}
            {{- if gt (.Values.gpu.nvidiaCount | int) 0 }}
            {{- $_ := set $res.limits "nvidia.com/gpu" .Values.gpu.nvidiaCount }}
            {{- end }}
            {{- toYaml $res | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /etc/tensorus
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "tensorus.fullname" . }}-config
        {{- if not .Values.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size | quote }}
  {{- end }}
